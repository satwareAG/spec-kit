name: Privacy Leak Detection

on:
  push:
    branches: [ main-speck ]
  pull_request:
    branches: [ main-speck ]

jobs:
  privacy-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run privacy check
        run: ./scripts/bash/check-privacy-leaks.sh .
