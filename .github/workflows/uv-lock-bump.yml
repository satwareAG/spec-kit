name: uv lock bump

# Weekly automatic uv.lock refresh.  Runs `uv lock --upgrade` on main-speck,
# creates a PR when dependencies changed.  Complements Dependabot (which
# handles pip and github-actions) with a lockfile-only bump for transitive
# dependency updates.

on:
  schedule:
    # Monday 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout fork (main-speck)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main-speck

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Upgrade uv lock
        run: uv lock --upgrade

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet uv.lock; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No dependency changes - skipping PR creation."
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create bump PR
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="deps/uv-lock-$(date +%Y-%m-%d)"
          git config user.email "ipadp-bot@users.noreply.github.com"
          git config user.name  "ipadp-lock-bump-bot"
          git checkout -b "$BRANCH"
          git add uv.lock
          git commit -m "chore(deps): bump uv.lock" \
            -m "Assisted-by: opencode (model: glm-5-turbo, autonomous)"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(deps): weekly uv.lock bump ($(date +%Y-%m-%d))" \
            --body "Automated weekly dependency lock update.

          - Ran \`uv lock --upgrade\`
          - Created from \`main-speck\`" \
            --label dependencies \
            --base main-speck \
            --head "$BRANCH"
